{% extends "base.html" %}
{% block title %}设置 · 408 Focus Console{% endblock %}
{% block content %}
<div class="page-head"><div><h1>设置</h1><p>只保留低频调整项，日常数据集中展示在首页和专注页。</p></div><a class="back-link" href="{{ url_for('dashboard') }}">返回首页</a></div>
<form id="settings-form" class="settings-grid">
  <article class="panel"><h2>时间窗口</h2><label>上午开始<input name="morning_start" type="time" required></label><label>午休开始<input name="lunch_start" type="time" required></label><label>图书馆开放<input name="library_open" type="time" required></label><label>图书馆闭馆<input name="library_close" type="time" required></label></article>
  <article class="panel"><h2>考试与专注</h2><label>考试日期<input name="exam_date" type="date" required></label><label>时区<input name="timezone" value="Asia/Shanghai" required></label><div class="setting-note">专注入口按学科区分，统一使用不限时计时。</div><button class="primary" type="submit">保存设置</button></article>
  <article class="panel"><h2>热度图显示时段</h2><p class="setting-note">取消固定休息时段，只保留需要观察的两小时行。</p><input id="heatmap-visible-hours" name="heatmap_visible_hours" type="hidden"><div class="heat-hour-options"><label><input type="checkbox" data-heat-hour="0">00-02</label><label><input type="checkbox" data-heat-hour="2">02-04</label><label><input type="checkbox" data-heat-hour="4">04-06</label><label><input type="checkbox" data-heat-hour="6">06-08</label><label><input type="checkbox" data-heat-hour="8">08-10</label><label><input type="checkbox" data-heat-hour="10">10-12</label><label><input type="checkbox" data-heat-hour="12">12-14</label><label><input type="checkbox" data-heat-hour="14">14-16</label><label><input type="checkbox" data-heat-hour="16">16-18</label><label><input type="checkbox" data-heat-hour="18">18-20</label><label><input type="checkbox" data-heat-hour="20">20-22</label><label><input type="checkbox" data-heat-hour="22">22-24</label></div><button class="primary" type="submit">保存设置</button></article>
  <article class="panel"><h2>数据维护入口</h2><p class="setting-note">模拟考成绩在此低频维护，首页展示趋势和相对目标进度。</p><a class="outline-button" href="#score-form">添加模拟考成绩</a></article>
</form>
<section class="settings-data-grid"><article class="panel" id="score-form"><div class="section-heading"><h2>模拟考成绩</h2><span>保存后首页即时更新</span></div><form class="inline-form" data-form="score"><input name="subject" placeholder="科目" required><input name="score" type="number" min="0" step="0.5" placeholder="最近成绩" required><input name="target" type="number" min="1" step="0.5" placeholder="目标成绩" required><button class="primary" type="submit">添加</button></form><div id="settings-scores" class="settings-list"></div></article></section>
{% endblock %}
