{% extends "base.html" %}
{% block title %}设置 · 408 Focus Console{% endblock %}
{% block content %}
<div class="page-head"><div><h1>设置</h1><p>只保留低频调整项，日常数据集中展示在首页和专注页。</p></div><a class="back-link" href="{{ url_for('dashboard') }}">返回首页</a></div>
<form id="settings-form" class="settings-grid">
  <article class="panel"><h2>时间窗口</h2><label>上午开始<input name="morning_start" type="time" required></label><label>午休开始<input name="lunch_start" type="time" required></label><label>图书馆开放<input name="library_open" type="time" required></label><label>图书馆闭馆<input name="library_close" type="time" required></label></article>
  <article class="panel"><h2>考试与专注</h2><label>考试日期<input name="exam_date" type="date" required></label><label>时区<input name="timezone" value="Asia/Shanghai" required></label><div class="setting-note">专注入口按学科区分，统一使用不限时计时。</div><button class="primary" type="submit">保存设置</button></article>
  <article class="panel"><h2>数据维护入口</h2><p class="setting-note">成绩目标和长期计划在此低频维护，首页与专注页只展示结果和进度。</p><a class="outline-button" href="#score-form">添加模拟考成绩</a><a class="outline-button" href="#plan-form">添加长期计划</a></article>
</form>
<section class="settings-data-grid"><article class="panel" id="score-form"><div class="section-heading"><h2>模拟考成绩</h2><span>保存后首页即时更新</span></div><form class="inline-form" data-form="score"><input name="subject" placeholder="科目" required><input name="score" type="number" min="0" step="0.5" placeholder="最近成绩" required><input name="target" type="number" min="1" step="0.5" placeholder="目标成绩" required><button class="primary" type="submit">添加</button></form><div id="settings-scores" class="settings-list"></div></article><article class="panel" id="plan-form"><div class="section-heading"><h2>长期计划</h2><span>按周量化</span></div><form class="plan-form" data-form="plan"><input name="week_start" type="date" required><input name="subject" placeholder="科目" required><input name="title" placeholder="计划内容" required><input name="target_minutes" type="number" min="1" placeholder="目标分钟" required><button class="primary" type="submit">添加</button></form><div id="settings-plans" class="settings-list"></div></article></section>
{% endblock %}
