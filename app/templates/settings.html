{% extends "base.html" %}
{% block title %}设置 · 408 Focus Console{% endblock %}
{% block content %}
<div class="page-head settings-page-head"><div><h1>控制台设置</h1><p>工作窗口、专注内容与展示范围</p></div><a class="back-link" href="{{ url_for('dashboard') }}">返回首页</a></div>
<form id="settings-form" class="settings-grid">
  <article class="panel settings-panel"><div class="settings-panel-head"><span>01</span><div><h2>工作时间</h2><small>每日有效学习窗口</small></div></div><div class="settings-field-grid"><label>上午开始<input name="morning_start" type="time" required></label><label>午休开始<input name="lunch_start" type="time" required></label><label>下午开始<input name="library_open" type="time" required></label><label>图书馆闭馆<input name="library_close" type="time" required></label></div></article>
  <article class="panel settings-panel"><div class="settings-panel-head"><span>02</span><div><h2>考试环境</h2><small>倒计时与日期计算</small></div></div><div class="settings-field-grid settings-field-grid-single"><label>考试日期<input name="exam_date" type="date" required></label><label>时区<input name="timezone" value="Asia/Shanghai" required></label></div></article>
  <article class="panel settings-panel settings-wide"><div class="settings-panel-head"><span>03</span><div><h2>热度图时段</h2><small>保留需要观察的两小时行</small></div></div><input id="heatmap-visible-hours" name="heatmap_visible_hours" type="hidden"><div class="heat-hour-options"><label><input type="checkbox" data-heat-hour="0">00-02</label><label><input type="checkbox" data-heat-hour="2">02-04</label><label><input type="checkbox" data-heat-hour="4">04-06</label><label><input type="checkbox" data-heat-hour="6">06-08</label><label><input type="checkbox" data-heat-hour="8">08-10</label><label><input type="checkbox" data-heat-hour="10">10-12</label><label><input type="checkbox" data-heat-hour="12">12-14</label><label><input type="checkbox" data-heat-hour="14">14-16</label><label><input type="checkbox" data-heat-hour="16">16-18</label><label><input type="checkbox" data-heat-hour="18">18-20</label><label><input type="checkbox" data-heat-hour="20">20-22</label><label><input type="checkbox" data-heat-hour="22">22-24</label></div></article>
  <article class="panel settings-panel settings-wide"><div class="settings-panel-head"><span>04</span><div><h2>专注内容</h2><small>首页入口与随机推荐卡片</small></div></div><div class="settings-content-grid"><label class="settings-editor">科目列表<textarea id="focus-subjects" rows="8" spellcheck="false" placeholder="每行一个科目"></textarea><small>每行一个，顺序即首页顺序</small></label><label class="settings-editor">标语卡片<textarea id="focus-messages" rows="8" spellcheck="false" placeholder="分类 | 内容，每行一条"></textarea><small>省略分类时自动使用“专注提醒”</small></label></div></article>
  <div class="settings-actions"><span id="settings-save-note">所有修改一次保存</span><button class="primary" type="submit">保存全部设置</button></div>
</form>
<section class="settings-data-grid"><article class="panel settings-panel" id="score-form"><div class="settings-panel-head"><span>05</span><div><h2>模拟考成绩</h2><small>保存后首页即时更新</small></div></div><form class="inline-form" data-form="score"><input name="subject" placeholder="科目" required><input name="score" type="number" min="0" step="0.5" placeholder="最近成绩" required><input name="target" type="number" min="1" step="0.5" placeholder="目标成绩" required><button class="primary" type="submit">添加成绩</button></form><div id="settings-scores" class="settings-list"></div></article></section>
{% endblock %}
