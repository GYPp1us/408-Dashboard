<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>408 Focus Console - 登录</title>
  <style>
    @font-face { font-family: "Source Han Serif SC Medium"; src: local("Source Han Serif SC Medium"), local("思源宋体 SC Medium"), local("Source Han Serif SC"), local("思源宋体 SC"), local("Noto Serif SC"); font-style: normal; font-weight: 500; font-display: swap; }
    body { margin: 0; display: grid; min-height: 100vh; place-items: center; background: #eef1f4; color: #20272f; font-family: "Source Han Serif SC Medium", "Source Han Serif SC", "思源宋体 SC", "Noto Serif SC", "Noto Serif CJK SC", "Songti SC", "STSong", serif; font-size: 18px; font-weight: 500; }
    main { width: min(360px, calc(100vw - 40px)); padding: 28px; border: 1px solid #dde3df; border-radius: 10px; background: #fff; box-shadow: 0 18px 46px rgba(36, 46, 42, .10); }
    h1 { margin: 0; font-size: 24px; }
    p { color: #758079; font-size: 14px; }
    label { display: block; margin: 20px 0 7px; color: #626e68; font-size: 13px; }
    input { width: 100%; height: 38px; box-sizing: border-box; padding: 0 10px; border: 1px solid #d6ddd9; border-radius: 6px; font: inherit; }
    button { width: 100%; height: 38px; margin-top: 14px; border: 0; border-radius: 6px; background: #ef5b3f; color: white; font: inherit; font-weight: 700; cursor: pointer; }
    .error { padding: 9px; border-radius: 6px; background: #fff1ec; color: #b83c2c; font-size: 13px; }
  </style>
</head>
<body>
  <main>
    <h1>408 Focus Console</h1>
    <p>个人备考控制台</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post">
      <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
      <label for="password">访问密码</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required autofocus>
      <button type="submit">进入控制台</button>
    </form>
  </main>
</body>
</html>
